# reproduction/configs/experiments/v9_error_analysis.yaml — sample-level NPZ 生成
# 来源: plan §A.2 (Ch3) + run_v9_error_analysis.py

name: v9_error_analysis
description: |
  生成 sample-level NPZ，用于 Ch3 PCOC-u 分桶诊断（图 3-1 ~ 3-4 + 热力图）。
  对每个 (dataset, method, seed) 用对应 calibrator 做 inference，保存:
    y_true, y_pred_uncalib, y_pred_calib, sigma2

# 依赖：main_99 阶段 4 完成（UMC + UAMCM 模型已训练）
depends_on: main_99

# FIX-9: 跑 3 seed 提升 P1 统计稳健性（plan §A.5.1 单 seed=1024 风险）
seeds: [1024, 2024, 3024]
datasets: [aliccp, avazu, criteo]

# B4: 跑 umc + uamcm 双方法（论文 Ch3 图 3-1~3-4 同时展示两者对比）
inference:
  methods: [umc, uamcm]
  use_calibrated_output: false  # CRITICAL: Ch3 诊断必须用未校准 backbone 输出
                                #          （plan §A.5.2 第 1 条审计项）
  save_calibrated_too: true     # 同时保存校准后输出供对比

# 输出
output:
  samples_dir: v9_samples       # 相对 CKPT_ROOT
  npz_fields:                   # save_samples.py 实际保存字段
    - y_true
    - y_pred_uncalib            # 未校准 backbone 预测
    - y_pred_calib              # 校准后预测
    - sigma2                    # PE σ² 方差（u = log(sigma2+1e-8) 派生）

# 后续分析（reproduction/analysis/figures/fig_3_*.py 读取此 NPZ）
analysis:
  pcoc_u_bins: 20               # 论文 Ch3 用 20 分位分桶
  heatmap_p_bins: 10            # 图 3-2 热力图 p 轴
  heatmap_u_bins: 5             # 图 3-2 热力图 u 轴

# 总任务量审计
totals:
  runs: 18                      # 2 methods × 3 datasets × 3 seeds
  estimated_gpu_hours: 6        # 每 run ~20min（含 train + eval + NPZ 保存）
