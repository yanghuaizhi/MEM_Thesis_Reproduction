# reproduction/configs/hardware/rtx5090.yaml — RTX 5090 单卡硬件优化
# 来源: plan §D.1-D.2 + reproduction/utils/gpu.py 接受的 cfg schema

name: rtx5090
description: |
  RTX 5090 单卡 32GB / 14vCPU / 120GB RAM (山东二区 2.98 元/h)。
  分 3 层优化：Tier 1 必做，Tier 2 smoke test 验证后启用，Tier 3 红线禁止动。

target_gpu:
  name: "RTX 5090"
  memory_gb: 32
  vcpu: 14
  ram_gb: 120

# Tier 1（完全安全，必做）
dataloader:
  num_workers: 12               # Plan B 2026-05-15: parallel=1 阶段提升到 12 (1 main + 12 worker = 13 < 14 vCPU)
                                # 原值 6 是为 --parallel 2 设计 (2×6+2=14)；当前 Plan B 用 parallel=1 故可拉满
                                # 历史 2026-05-14 14:36 parallel=4 × num_workers=12 因 4×12+4=52 撞墙 → 当时降到 6
                                # 现在 parallel=1 × num_workers=12 = 13 procs 安全；DataLoader 不卡 GPU
                                # NOTE: v9/v10 切回 parallel=2 前需 chain script 自动 sed 改回 6
  num_workers_pretrain: 12      # pretrain 是单任务 (orchestrator parallel=1)，可用 12 worker
                                # 跑满 13/14 vCPU。AliCCP/Avazu 历史 backbone 用 12 跑通 17min/5min。
  pin_memory: true
  persistent_workers: true      # 减少 worker 重建开销
  prefetch_factor: 8            # 预取 batch 数（4→8 优化 2026-05-14 16:11: 每 worker 多预 4 batch
                                # ≈ 480MB RAM 额外，让 DataLoader 不卡 GPU 等数据；零数值影响）

eval:
  batch_size_multiplier: 8      # 推理 batch = batch_size_calib * 8 (4→8 优化 2026-05-14 16:11)
                                # backbone 实测 < 1GB / 32GB 显存，calib precompute peak < 5GB 估算
                                # eval batch 上调到 ×8 推理速度估快 ~50%，零数值影响
  # NOTE: 历史保守值 ×4 是没 smoke verify 时设的；现已实测 backbone GPU mem 891 MB（3%），
  # 可上调到 8 进一步加速 (calib 显存 = backbone + calibrator + precompute cache)

# Tier 2（近无关，需 smoke test 验证 |ΔECE| < 1e-5 后启用）
precision:
  allow_tf32_matmul: true       # cuda.matmul.allow_tf32
  allow_tf32_cudnn: true        # cudnn.allow_tf32
  matmul_precision: high        # torch.set_float32_matmul_precision

compile:
  enabled: false                # 默认关，smoke test 验证后开（Blackwell 兼容性待 verify）

# Tier 3 红线（gpu.py setup_hardware 强制 enforce，不让 cfg 覆盖）
tier3_locked:
  cudnn_benchmark: false        # 引入不确定性
  cudnn_deterministic: true
  mixed_precision: false        # 论文是 FP32
  train_batch_size_override: false  # 不允许通过 hardware cfg 改训练 batch_size

# 预算
budget:
  rmb_per_hour: 2.98
  total_rmb: 340
  total_hours: 114.0            # 340 / 2.98
  performance_assumption: 1.5x  # 相对 RTX 4090（plan §D.1 基准）
