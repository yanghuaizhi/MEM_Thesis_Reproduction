# reproduction/configs/methods/sbcr.yaml — SBCR (SelfBoostCalibRank)
# 类型: 神经基线（不依赖 u）

name: sbcr
type: neural_baseline
uses_u: false
entry: train_neu
description: "Self-Boost Calibration with Ranking"

hyperparameters:
  lr_calib: 1.0e-3
  epochs_calib: 20
  patience: 5
  min_delta: 1.0e-5
  selection: loss_best
  restore_best: true
  calib_log_every: 200
  # SCL contrastive loss（仅 SCL 类方法使用）
  scl_lam: 1.0e-2
  scl_beta: 0.95
